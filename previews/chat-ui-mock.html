<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jane / Liang Chat UI Mock</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        background: #f7f4ef;
        color: #111;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      .page {
        max-width: 1480px;
        margin: 0 auto;
        padding: 28px 20px;
      }
      .intro {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }
      .eyebrow {
        margin: 0 0 8px;
        color: #6e6a62;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 36px;
        font-weight: 400;
        line-height: 1;
      }
      .intro p:last-child {
        max-width: 540px;
        margin: 0;
        color: #6e6a62;
        font-size: 14px;
        line-height: 1.45;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 20px;
      }
      .phone-shell {
        overflow: hidden;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 28px;
        background: #050505;
        box-shadow: 0 20px 50px rgba(20, 16, 12, 0.18);
      }
      .phone {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 390px;
        height: 812px;
        max-height: 82vh;
        min-height: 720px;
        margin: 0 auto;
        overflow: hidden;
      }
      .top {
        flex: 0 0 auto;
        border-bottom: 1px solid var(--line);
        background: var(--header);
        padding: 12px 16px 13px;
      }
      .status {
        display: flex;
        height: 20px;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        font-weight: 700;
      }
      .nav {
        display: grid;
        grid-template-columns: 38px 1fr 38px;
        align-items: center;
        margin-top: 16px;
      }
      .back, .more {
        font-size: 30px;
        line-height: 1;
      }
      .more { text-align: right; }
      .title {
        min-width: 0;
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.25;
      }
      .theme-head {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: var(--header);
        padding: 12px 16px;
      }
      .theme-name {
        font-size: 15px;
        font-weight: 700;
      }
      .theme-note {
        margin-top: 2px;
        color: var(--time);
        font-size: 12px;
      }
      .swatches {
        display: flex;
        gap: 8px;
        color: #6e6a62;
        font-size: 10px;
      }
      .swatch {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .dot {
        width: 12px;
        height: 12px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 50%;
      }
      .thread {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        padding: 16px 14px;
      }
      .time {
        margin: 0 0 12px;
        color: var(--time);
        text-align: center;
        font-size: 17px;
      }
      .row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 16px;
      }
      .row.mine {
        justify-content: flex-end;
      }
      .avatar {
        width: 46px;
        height: 46px;
        flex: 0 0 46px;
        border-radius: 6px;
        object-fit: cover;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
      }
      .stack {
        display: flex;
        max-width: 74%;
        flex-direction: column;
        align-items: flex-start;
      }
      .mine .stack {
        align-items: flex-end;
      }
      .name {
        margin-bottom: 4px;
        color: var(--time);
        font-size: 12px;
      }
      .bubble-wrap {
        position: relative;
      }
      .bubble {
        margin: 0;
        border-radius: 6px;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.04);
        font-size: 18px;
        line-height: 1.45;
        padding: 8px 14px;
      }
      .other .bubble {
        background: var(--other);
        color: var(--other-text);
      }
      .mine .bubble {
        background: var(--mine);
        color: var(--mine-text);
      }
      .tail {
        position: absolute;
        top: 13px;
        width: 12px;
        height: 12px;
        transform: rotate(45deg);
      }
      .other .tail {
        left: -6px;
        background: var(--other);
      }
      .mine .tail {
        right: -6px;
        background: var(--mine);
      }
      .composer {
        flex: 0 0 auto;
        border-top: 1px solid var(--line);
        background: var(--header);
        padding: 8px 12px 16px;
      }
      .composer-row {
        display: grid;
        grid-template-columns: 36px 1fr 36px 36px;
        align-items: center;
        gap: 8px;
      }
      .circle {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border: 1px solid rgba(0, 0, 0, 0.72);
        border-radius: 50%;
        font-size: 22px;
        line-height: 1;
      }
      .input {
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--input);
      }
      @media (max-width: 1220px) {
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 720px) {
        .page { padding: 18px 12px; }
        .intro { display: block; }
        .intro p:last-child { margin-top: 12px; }
        .grid { grid-template-columns: 1fr; }
        .phone { max-height: none; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <div>
          <p class="eyebrow">Chat UI mock</p>
          <h1>Jane / Liang family chat</h1>
        </div>
        <p>Jane is treated as "me": right aligned, green-style bubble, Jane avatar on the right. Liang stays left aligned with a white bubble.</p>
      </section>
      <section id="grid" class="grid"></section>
    </main>

    <script>
      const themes = [
        ["A. WeChat Fresh", "closest to the reference", "#ededed", "#f7f7f7", "#95ec69", "#111111", "#ffffff", "#171717", "#8f8f8f", "#d7d7d7", "#ffffff"],
        ["B. Auri Warm", "softer, premium family app", "#f4efe8", "#fbf8f3", "#72d984", "#08200d", "#fffdfa", "#1c1916", "#9b8f83", "#e2d8cc", "#fffdfa"],
        ["C. Calm Mint", "cleaner and quieter", "#eef4f1", "#f9fbfa", "#63d5a2", "#062116", "#ffffff", "#14201b", "#7f9188", "#d7e1dc", "#ffffff"],
        ["D. Soft Coral", "warmer accent, less WeChat", "#f5f0ee", "#fffafa", "#ffcfbf", "#32130b", "#ffffff", "#201817", "#958784", "#e3d6d2", "#ffffff"]
      ];
      const messages = [
        ["other", "Liang", "2:26 PM", "真是美好的时光，感恩"],
        ["mine", "Jane", "2:33 PM", "是塞牙了吗"],
        ["mine", "Jane", "", "带着电动牙刷没🤭🤭"],
        ["other", "Liang", "", "哈哈哈，没事，我已经搞定了"],
        ["mine", "Jane", "", "小宝儿最喜欢逛逛了，不爱上幼儿园。。。"],
        ["mine", "Jane", "", "我把后面 3 周的幼儿园退了"]
      ];
      const grid = document.querySelector("#grid");

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        })[char]);
      }

      function messageHtml(message) {
        const [side, name, time, text] = message;
        const mine = side === "mine";
        const avatar = mine ? "../public/family/jane.jpg" : "../public/family/liang.jpg";
        return `
          ${time ? `<p class="time">${time}</p>` : ""}
          <div class="row ${side}">
            ${mine ? "" : `<img class="avatar" src="${avatar}" alt="${name}" />`}
            <div class="stack">
              <div class="name">${name}</div>
              <div class="bubble-wrap">
                <p class="bubble">${escapeHtml(text)}</p>
                <span class="tail"></span>
              </div>
            </div>
            ${mine ? `<img class="avatar" src="${avatar}" alt="${name}" />` : ""}
          </div>
        `;
      }

      themes.forEach(([name, note, page, header, mine, mineText, other, otherText, time, line, input]) => {
        const article = document.createElement("article");
        article.className = "phone-shell";
        article.style.setProperty("--page", page);
        article.style.setProperty("--header", header);
        article.style.setProperty("--mine", mine);
        article.style.setProperty("--mine-text", mineText);
        article.style.setProperty("--other", other);
        article.style.setProperty("--other-text", otherText);
        article.style.setProperty("--time", time);
        article.style.setProperty("--line", line);
        article.style.setProperty("--input", input);
        article.innerHTML = `
          <div class="phone" style="background: var(--page)">
            <header class="top">
              <div class="status"><span>4:57 PM</span><span>5G&nbsp;&nbsp;82%</span></div>
              <div class="nav"><div class="back">‹</div><div class="title">子杉宝宝家人群 (5)</div><div class="more">···</div></div>
            </header>
            <div class="theme-head">
              <div><div class="theme-name">${name}</div><div class="theme-note">${note}</div></div>
              <div class="swatches">
                <span class="swatch"><span class="dot" style="background:${mine}"></span>me</span>
                <span class="swatch"><span class="dot" style="background:${other}"></span>other</span>
                <span class="swatch"><span class="dot" style="background:${page}"></span>bg</span>
              </div>
            </div>
            <div class="thread">${messages.map(messageHtml).join("")}</div>
            <footer class="composer">
              <div class="composer-row"><div class="circle">◉</div><div class="input"></div><div class="circle">☺</div><div class="circle">＋</div></div>
            </footer>
          </div>
        `;
        grid.appendChild(article);
      });
    </script>
  </body>
</html>
